{% extends 'restaurant/base.html' %}

{% block content %}

<div class="container py-4">

    <h2 class="fw-bold mb-4 text-center text-md-start">
        🍽️ Our Menu
    </h2>

    <div class="row g-3">

        {% for meal in meals %}

        <!-- SAME GRID AS HOMEPAGE -->
        <div class="col-6 col-md-4 col-lg-3">

            <div class="card meal-card h-100 border-0 shadow-sm">

                <!-- IMAGE -->
                <div class="meal-img-wrapper">
                    <img src="{{ meal.image.url }}" class="meal-img">
                </div>

                <!-- BODY -->
                <div class="card-body d-flex flex-column">

                    <h6 class="meal-title">
                        {{ meal.name }}
                    </h6>

                    <p class="meal-desc text-muted">
                        {{ meal.description|truncatewords:10 }}
                    </p>

                    <div class="mt-auto d-flex justify-content-between align-items-center">

                        <span class="meal-price">
                            ₦{{ meal.price }}
                        </span>

                        <form action="{% url 'add_to_cart' meal.id %}" method="post">
                            {% csrf_token %}
                            <button class="btn btn-warning btn-sm add-btn">
                                Add
                            </button>
                        </form>

                    </div>

                </div>

                <a href="{% url 'meal_detail' meal.slug %}" class="stretched-link"></a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<style>

body{
    background: #f8f9fa;
}

/* CARD STYLE (same as homepage) */
.meal-card{
    border-radius: 18px;
    overflow: hidden;
    transition: all 0.3s ease;
    background: #fff;
}

.meal-card:hover{
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.08);
}

/* IMAGE */
.meal-img-wrapper{
    height: 170px;
    overflow: hidden;
}

.meal-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.3s ease;
}

.meal-card:hover .meal-img{
    transform: scale(1.05);
}

/* TEXT */
.meal-title{
    font-size: 15px;
    font-weight: 700;
    color: #212529;
}

.meal-desc{
    font-size: 13px;
    line-height: 1.4;
}

/* PRICE */
.meal-price{
    font-size: 16px;
    font-weight: 700;
    color: #ff9800;
}

/* BUTTON */
.add-btn{
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 576px){

    .meal-img-wrapper{
        height: 130px;
    }

    .meal-title{
        font-size: 14px;
    }

    .meal-desc{
        font-size: 12px;
    }

    .meal-price{
        font-size: 14px;
    }

}

</style>

{% endblock %}
