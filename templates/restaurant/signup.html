{% extends 'restaurant/base.html' %}

{% block content %}

<style>
    body{
    background: linear-gradient(to right, #fff8e1, #ffffff);
    min-height: 100vh;
}

.signup-card{
    border: none;
    border-radius: 20px;
    background: #fff;
}

.custom-input,
.form-control{
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #ddd;
    transition: all 0.3s ease;
}

.form-control:focus{
    border-color: #ffc107;
    box-shadow: 0 0 10px rgba(255,193,7,0.3);
}

.signup-btn{
    padding: 12px;
    border-radius: 12px;
    font-weight: 600;
    transition: 0.3s ease;
}

.signup-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(255,193,7,0.4);
}

.login-link{
    color: #ff9800;
    text-decoration: none;
    font-weight: 600;
}

.login-link:hover{
    text-decoration: underline;
}
</style>

<div class="container py-5">
    <div class="row justify-content-center align-items-center">

        <div class="col-md-5">

            <div class="card signup-card shadow-lg p-4">

                <div class="text-center mb-4">
                    <h2 class="fw-bold">Create Account</h2>
                    <p class="text-muted">
                        Sign up to continue ordering delicious meals
                    </p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        {{ form.phone }}
                    </div>

                    <div class="mb-3">
                        {{ form.address }}
                    </div>

                    <div class="mb-3">
                        {{ form.password1 }}
                    </div>

                    <div class="mb-3">
                        {{ form.password2 }}
                    </div>

                    <button class="btn btn-warning w-100 signup-btn">
                        Sign Up
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small>
                        Already have an account?
                        <a href="{% url 'login' %}" class="login-link">
                            Login
                        </a>
                    </small>
                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
