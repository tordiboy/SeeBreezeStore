{% extends 'restaurant/base.html' %}

{% block content %}

<div class="container py-4">

    <div class="row g-4 align-items-center">

        <!-- IMAGE -->
        <div class="col-12 col-md-6">
            <div class="meal-image-wrapper">
                <img src="{{ meal.image.url }}" class="meal-image">
            </div>
        </div>

        <!-- DETAILS -->
        <div class="col-12 col-md-6">

            <h2 class="fw-bold">{{ meal.name }}</h2>

            <p class="text-muted mt-3">
                {{ meal.description }}
            </p>

            <h3 class="text-success my-4">
                ${{ meal.price }}
            </h3>

            <form action="{% url 'add_to_cart' meal.id %}" method="post">
                {% csrf_token %}
                <button class="btn btn-success btn-lg px-4 w-100 w-md-auto">
                    🍽️ Add to Cart
                </button>
            </form>

        </div>

    </div>

</div>

<!-- RESPONSIVE STYLES -->
<style>

    .meal-image-wrapper {
        width: 100%;
        height: 350px;
        overflow: hidden;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .meal-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.3s ease;
    }

    .meal-image-wrapper:hover .meal-image {
        transform: scale(1.05);
    }

    /* Tablet */
    @media (max-width: 768px) {
        .meal-image-wrapper {
            height: 280px;
        }

        h2 {
            text-align: center;
        }

        h3 {
            text-align: center;
        }

        form button {
            width: 100%;
        }
    }

    /* Mobile */
    @media (max-width: 480px) {
        .meal-image-wrapper {
            height: 220px;
        }

        p {
            text-align: center;
        }
    }

</style>

{% endblock %}
